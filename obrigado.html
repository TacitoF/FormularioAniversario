<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Obrigado pelo aviso! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FF6EB4;
            --pink-light: #FFB3D9;
            --purple: #C77DFF;
            --purple-deep: #7B2FBE;
            --text: #4A2060;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #c9eeff;
            background-image: url('fundo2.png');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Corações flutuantes */
        .hearts {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            animation: floatHeart linear forwards;
            font-size: 1.5rem;
            opacity: 0;
        }

        @keyframes floatHeart {
            0%   { transform: translateY(110vh) scale(0.5); opacity: 0; }
            15%  { opacity: 0.8; }
            85%  { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .card-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.92); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .rainbow-bar {
            height: 10px;
            background: linear-gradient(90deg,
                #FF6B6B, #FFB347, #FFD700, #90EE90,
                #74C7EC, #9B59B6, #FF69B4
            );
            border-radius: 20px 20px 0 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(20px);
            padding: 40px 30px 45px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 25px 50px rgba(123, 47, 190, 0.2), 0 0 0 3px rgba(255, 255, 255, 0.8);
            text-align: center;
        }

        /* Coração animado principal */
        .heart-main {
            font-size: 4.5rem;
            display: block;
            margin-bottom: 15px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14%  { transform: scale(1.15); }
            28%  { transform: scale(1); }
            42%  { transform: scale(1.1); }
            70%  { transform: scale(1); }
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--purple-deep);
            font-size: 2rem;
            margin-bottom: 12px;
            text-shadow: 2px 2px 0 rgba(199, 125, 255, 0.25);
        }

        .message {
            color: #9B6BB5;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .message-secondary {
            color: rgba(123, 47, 190, 0.6);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 35px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 28px 0;
            color: var(--pink-light);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--pink-light), transparent);
            border-radius: 2px;
        }

        /* Quote fofa */
        .quote-box {
            background: linear-gradient(135deg, rgba(199, 125, 255, 0.08), rgba(255, 110, 180, 0.08));
            border: 2px dashed rgba(199, 125, 255, 0.3);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 30px;
        }

        .quote-text {
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            color: var(--purple-deep);
            line-height: 1.5;
        }

        .quote-sub {
            font-size: 0.8rem;
            color: rgba(123, 47, 190, 0.5);
            font-weight: 600;
            margin-top: 8px;
        }

        /* Botão voltar */
        .btn-voltar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, var(--purple-deep), var(--purple), var(--pink));
            background-size: 200% 200%;
            padding: 15px 32px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 0.95rem;
            font-family: 'Nunito', sans-serif;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(123, 47, 190, 0.4);
        }

        .btn-voltar:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(123, 47, 190, 0.5); }
        .btn-voltar:active { transform: scale(0.96); }

        .card-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.78rem;
            color: rgba(123, 47, 190, 0.4);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="card-wrapper">
    <div class="rainbow-bar"></div>
    <div class="card">
        <span class="heart-main">❤️</span>

        <h1>Obrigado pelo aviso!</h1>
        <p class="message">Uma pena que não poderá vir,<br>mas agradecemos muito por nos avisar.</p>
        <p class="message-secondary">Sentiremos sua falta! 🥺</p>

        <div class="divider">🌸</div>

        <div class="quote-box">
            <div class="quote-text">
                "Cada coração importa para nós.<br>
                O seu com certeza já foi celebrado! 🌈"
            </div>
            <div class="quote-sub">— Família da Sofia 🐻</div>
        </div>

        <a href="index.html" class="btn-voltar">
            ← Voltar ao início
        </a>

        <div class="card-footer">🌟 Sofia faz 5 anos · 17 de Julho de 2026 🌟</div>
    </div>
</div>

<script>
    const heartEmojis = ['❤️', '💕', '💗', '💖', '💝', '🩷', '💜', '🌸'];
    const container = document.getElementById('hearts');

    for (let i = 0; i < 20; i++) {
        const el = document.createElement('div');
        el.className = 'heart';
        el.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDuration = (5 + Math.random() * 8) + 's';
        el.style.animationDelay = (Math.random() * 6) + 's';
        el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        container.appendChild(el);
    }
</script>
</body>
</html>
